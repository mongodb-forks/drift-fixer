name: drift-fixer
description: Detect and automatically fix Terraform/OpenTofu configuration drift, then commit or open a PR with the fixes.
author: trevor159

branding:
  icon: refresh-cw
  color: purple

inputs:
  path:
    description: Path to the Terraform/OpenTofu project directory.
    required: false
    default: "."
  tf-bin:
    description: Terraform/OpenTofu binary to use (e.g. tofu or terraform).
    required: false
    default: tofu
  verbose:
    description: Print every attribute and block change as it is applied.
    required: false
    default: "false"
  mode:
    description: |
      What to do after fixing drift. Options:
        pr      — open a pull request with the changes (default)
        commit  — commit and push directly to the current branch
        dry-run — detect and report drift without writing any files or opening a PR
    required: false
    default: pr
  pr-base:
    description: Base branch the pull request should target. Defaults to the repository's default branch, which is required when the workflow runs on a detached HEAD (the usual case for scheduled runs).
    required: false
    default: ${{ github.event.repository.default_branch }}
  pr-branch:
    description: Branch name to use when mode is 'pr'. Defaults to drift-fixer/fix-<run_id>.
    required: false
    default: ""
  pr-title:
    description: Title of the pull request when mode is 'pr'.
    required: false
    default: "fix: sync Terraform config with infrastructure drift"
  pr-draft:
    description: Open the pull request as a draft (true) or ready-for-review (false).
    required: false
    default: "true"
  commit-message:
    description: Commit message used for both 'commit' and 'pr' modes.
    required: false
    default: "fix: sync Terraform config with infrastructure drift"
  git-user-name:
    description: |
      Name configured as commit author/committer in 'commit' mode. Override this
      when pushing as a GitHub App so the commit is attributed to the app — e.g.
      "my-bot[bot]".
    required: false
    default: "github-actions[bot]"
  git-user-email:
    description: |
      Email configured as commit author/committer in 'commit' mode. For GitHub
      Apps the convention is "<app-id>+<app-slug>[bot]@users.noreply.github.com".
    required: false
    default: "github-actions[bot]@users.noreply.github.com"
  token:
    description: GitHub token used to push branches and open PRs. Defaults to the built-in GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}

outputs:
  drift-detected:
    description: "'true' if any drift was found, 'false' otherwise."
    value: ${{ steps.run.outputs.drift-detected }}
  pr-url:
    description: URL of the pull request opened when mode is 'pr' (empty otherwise).
    value: ${{ steps.pr.outputs.pull-request-url }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/go/go.mod

    - name: Build drift-fixer
      shell: bash
      run: |
        cd "${{ github.action_path }}/go"
        GOTOOLCHAIN=local CGO_ENABLED=0 go build -ldflags="-s -w" -o "${{ github.action_path }}/drift-fixer-bin" ./cmd/drift-fixer/

    - name: Initialize ${{ inputs.tf-bin }}
      shell: bash
      working-directory: ${{ inputs.path }}
      env:
        TF_BIN: ${{ inputs.tf-bin }}
      run: |
        # Retry init to absorb transient registry/CDN failures (e.g. 502 from
        # GitHub releases when fetching provider checksums).
        attempt=1
        max_attempts=3
        delay=5
        until "$TF_BIN" init; do
          if [ "$attempt" -ge "$max_attempts" ]; then
            echo "$TF_BIN init failed after $attempt attempts" >&2
            exit 1
          fi
          echo "$TF_BIN init failed (attempt $attempt/$max_attempts); retrying in ${delay}s..." >&2
          sleep "$delay"
          attempt=$((attempt + 1))
          delay=$((delay * 3))
        done

    - name: Run drift-fixer
      id: run
      shell: bash
      env:
        DRIFT_FIXER_TF_BIN: ${{ inputs.tf-bin }}
      run: |
        ARGS="-path ${{ inputs.path }}"
        if [ "${{ inputs.verbose }}" = "true" ]; then
          ARGS="$ARGS -verbose"
        fi
        if [ "${{ inputs.mode }}" = "dry-run" ]; then
          ARGS="$ARGS -dry-run"
        fi

        set +e
        "${{ github.action_path }}/drift-fixer-bin" $ARGS
        EXIT_CODE=$?
        set -e

        # Non-zero exit = hard error OR drift remained after attempted fixes.
        # In either case we do not want a partial PR/commit, so fail the run.
        if [ $EXIT_CODE -ne 0 ]; then
          exit $EXIT_CODE
        fi

        # Discard any platform-specific h1 hashes init appended to the lockfile
        # so they don't pollute drift detection or ride along in the PR. Done
        # after the binary runs because tofu plan needs the hash to validate
        # the cached provider.
        LOCKFILE="${{ inputs.path }}/.terraform.lock.hcl"
        if [ -f "$LOCKFILE" ]; then
          git checkout -- "$LOCKFILE" 2>/dev/null || true
        fi

        if git diff --quiet; then
          echo "drift-detected=false" >> "$GITHUB_OUTPUT"
        else
          echo "drift-detected=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Commit directly
      if: inputs.mode == 'commit' && steps.run.outputs.drift-detected == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        git config user.name  "${{ inputs.git-user-name }}"
        git config user.email "${{ inputs.git-user-email }}"
        git add -A
        git commit -m "${{ inputs.commit-message }}"
        # On pull_request events github.ref_name is a synthetic '<pr>/merge'
        # ref, so use github.head_ref (the PR's source branch) instead.
        BRANCH="${{ github.head_ref || github.ref_name }}"
        git push origin "HEAD:refs/heads/${BRANCH}"

    - name: Open pull request
      id: pr
      if: inputs.mode == 'pr' && steps.run.outputs.drift-detected == 'true'
      uses: mongodb-forks/create-pull-request@eec7ab75b2f71ddc8a223341c83a67f6f774c39f
      with:
        token: ${{ inputs.token }}
        base: ${{ inputs.pr-base }}
        branch: ${{ inputs.pr-branch != '' && inputs.pr-branch || format('drift-fixer/fix-{0}', github.run_id) }}
        commit-message: ${{ inputs.commit-message }}
        title: ${{ inputs.pr-title }}
        body: |
          Automated drift fix generated by [drift-fixer](https://github.com/trevor159/drift-fixer).

          Terraform/OpenTofu detected configuration drift and this PR syncs the `.tf` files to match the actual infrastructure state.

          > Triggered by workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        delete-branch: true
        draft: ${{ inputs.pr-draft }}
