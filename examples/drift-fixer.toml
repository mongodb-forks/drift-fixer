# Configuration file for drift-fixer
# This file allows customization of drift detection and fixing behavior

[general]
# Default behavior settings
auto_commit = true
dry_run = false
verbose = false

[terraform]
# Terraform-specific settings
init_if_needed = true
plan_args = ["-detailed-exitcode", "-no-color"]
validate_before_fix = true

[resources]
# Resource-specific configuration
# Define which resource types and attributes to handle

[resources.github_repository]
# GitHub repository resource settings
enabled = true
# Attributes that are safe to auto-fix
safe_attributes = [
    "description", 
    "topics", 
    "homepage_url", 
    "has_issues", 
    "has_projects", 
    "has_wiki",
    "allow_merge_commit", 
    "allow_squash_merge", 
    "allow_rebase_merge",
    "delete_branch_on_merge",
    "archived"
]
# Attributes to never auto-fix (require manual intervention)
protected_attributes = [
    "name", 
    "visibility", 
    "default_branch"
]

[resources.github_branch_protection]
enabled = true
safe_attributes = [
    "enforce_admins",
    "require_signed_commits", 
    "required_linear_history"
]
protected_attributes = [
    "pattern",
    "required_status_checks"
]

[git]
# Git operation settings
create_branch_for_fixes = false
branch_name_template = "drift-fix-{timestamp}"
commit_message_template = "Fix Terraform configuration drift\n\n{details}"

[tfedit]
# tfedit CLI settings
command = "tfedit"
timeout = 30
retry_attempts = 3

[tfparse]  
# tfparse library settings
include_modules = true
follow_symlinks = false

[filters]
# Filtering options
# Ignore certain types of changes
ignore_computed_attributes = true
ignore_terraform_version_changes = true
ignore_provider_version_changes = true

# File patterns to exclude from processing
exclude_files = [
    "*.backup.tf",
    "*test*.tf"
]

# Resource addresses to exclude (regex patterns)
exclude_resources = [
    ".*\\.test_.*",  # Exclude test resources
]

[notifications]
# Notification settings (future feature)
enabled = false
slack_webhook = ""
email_recipients = []