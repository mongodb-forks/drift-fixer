name: Fix Terraform Drift

# Example workflow showing how to use the drift-fixer action.
# Copy this into your own repo's .github/workflows/ and adjust as needed.

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:       # allow manual runs

jobs:
  fix-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push commits / branches
      pull-requests: write  # needed to open PRs

    steps:
      - uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Fix drift and open PR
        uses: mongodb-forks/drift-fixer@master
        with:
          path: ./infra          # directory containing your .tf files
          tf-bin: tofu           # or terraform
          mode: pr               # pr | commit | dry-run
          # verbose: "true"               # log every attribute change
          # pr-draft: "false"             # ready-for-review instead of draft
          # pr-branch: drift-fixer/fix    # fixed branch name (default is per-run)
          # pr-title: "chore: sync infra drift"
          # commit-message: "chore: sync infra drift"
